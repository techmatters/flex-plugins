<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <title>Modica to Flex test page</title>
  <style>
    #message-history {
      font-family: 'Courier New', Courier, monospace;
    }
  </style>
</head>
<body>
<div style="font-family: courier,serif" id="message-history">
</div>
<form name="modica-message-input" onsubmit="sendMessage(event); return false;">
  <select name="destination-drop-down">
    <option value="5770">NZ_STG</option>
    <option value="234">NZ_PROD</option>
    <option value="+12052704607">AS_DEV</option>
    <option value="+15375688305">AS_STG</option>
    <option value="+12165428033">AS_PROD</option>
  </select>
  <label for="message-sender-textbox">Sender Number</label> <input type="text" id="message-sender-textbox" name="message-sender-textbox" value="1111111"/>
  <br/>
  <textarea name="message-input-box"></textarea>
  <input type="submit" name="message-input-send" />
</form>
<pre style="font-family: courier,serif" id="message-response">
</pre>

<script>
  const WEBHOOK_URL = "https://hrm-production.tl.techmatters.org/lambda/modicaWebhook";
  const messageHistoryElement = document.getElementById("message-history");
  const messageResponseElement = document.getElementById("message-response");
  const sendMessage = async (e) => {
    e.preventDefault();
    const sendForm = document.forms["modica-message-input"];
    const content = sendForm.elements["message-input-box"].value;
    const destination = sendForm.elements["destination-drop-down"].value;
    const source = sendForm.elements["message-sender-textbox"].value;
    if (content) {
      sendForm.elements["message-input-box"].value = "";
      const messageElement = document.createElement("pre");
      messageElement.append(`[${destination}] ${(new Date()).toISOString()}: ${content}`);
      messageResponseElement.innerText = "Sending....";
      messageResponseElement.style.color = '#000000FF';
      try {
        const response = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ destination, source, content, useTestApi: true, testSessionId: 'TESTPAGE' }),
        });
        messageHistoryElement.append(messageElement);
        messageResponseElement.innerText = `status: ${response.status} [${response.statusText}]
    ${await response.text()}
    `;
        messageResponseElement.style.color = response.ok ? '#006600FF' : '#660000FF';
      } catch (err) {
        messageResponseElement.innerText = `Network error: ${err.message}`;
        messageResponseElement.style.color = '#660000FF';
      }
    }
  };
</script>
</body>
</html>
