name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
env:
  SITE_USER: ${{ secrets.AS_DEV_FLEX_AUTOMATION_USER }}
  SITE_PASS: ${{ secrets.AS_DEV_FLEX_AUTOMATION_PASSWORD }}
  SITE_ACCOUNT_SID: ${{ secrets.AS_DEV_FLEX_AUTOMATION_SID }}
jobs:
  copilot-setup-steps:

    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          # For monorepos with multiple lockfiles:
          cache-dependency-path: |
            aselo-webchat-react-app/package-lock.json
            lambdas/package-lock.json

      - name: Export debugging credentials
        run: |
          echo "SITE_USER=${{ secrets.AS_DEV_FLEX_AUTOMATION_USER }}" >> $GITHUB_ENV
          echo "SITE_PASS=${{ secrets.AS_DEV_FLEX_AUTOMATION_PASSWORD }}" >> $GITHUB_ENV
          echo "SITE_ACCOUNT_SID=${{ secrets.AS_DEV_FLEX_AUTOMATION_SID }}" >> $GITHUB_ENV

      # aselo-webchat-react-app
      - name: Install dependencies for aselo-webchat-react-app
        run: npm ci
        working-directory: aselo-webchat-react-app